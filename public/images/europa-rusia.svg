  <!-- Franja blanca horizontal central (bandera rusa) -->
  <path d="M92,175 L308,175 L308,200 L92,200 Z" fill="#ffffff" opacity="0.25"/>
  <!-- Franja azul horizontal inferior (bandera rusa) -->
  <path d="M92,200 L308,200 L308,225 L92,225 Z" fill="#0039A6" opacity="0.3"/>
